# Country records keyed by ISO alpha-3.
# Standings: member | inner-assoc | outer-assoc | strategic
# Hestia participation values: 1 (full) | 0 (none)
# All 16 Hestias must be present for each country; missing keys are treated as 0.
#
# `reasons:` is optional. Only include entries for Hestias where the country's
# participation level is notable or surprising — e.g. non-participation due to
# neutrality, a distinctive role, or context that is not obvious from the
# standing alone. Omit routine/obvious entries.

