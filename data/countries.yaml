# === MEMBERS ===

DEU:
  name: Germany
  standing: member
  note: Anchor of the Union — in every fire
  hestias: { fiscal: 1, shield: 1, gate: 1, loom: 1, green: 1, bench: 1, atlas: 1, forge: 1, library: 1, spring: 1, anchor: 1, lyre: 1, krone: 0, pharmacy: 1, beacon: 1, lattice: 1 }
  reasons:
    fiscal: Founding Eurozone member; Europe's largest economy and anchor of the euro.
    shield: Full NATO member; largest European defence spender; hosts major US and allied bases.
    gate: Founding Schengen member; central geography makes it the Union's transit hub.
    loom: Europe's largest digital economy; strong on GDPR enforcement and AI regulation.
    green: Energiewende pioneer; largest ETS participant; major offshore wind capacity.
    bench: Fully integrated into EU judicial cooperation; constitutional court actively engages with CJEU.
    atlas: Major ESA contributor; DLR is a leading space agency; strong satellite and launcher programmes.
    forge: Industrial powerhouse — automotive, chemicals, machinery; critical for strategic autonomy.
    library: Largest Erasmus destination by volume; deep university exchange networks.
    spring: Rhine and Elbe basins; extensive transboundary water management obligations.
    anchor: North Sea and Baltic coastlines; active coast guard cooperation.
    lyre: Rich cultural heritage infrastructure; major museum and conservation networks.
    krone: Euro member — not in the Nordic currency zone.
    pharmacy: Major pharmaceutical industry (Bayer, BioNTech); full HERA participant.
    beacon: Largest Horizon Europe contributor; Max Planck, Fraunhofer, Helmholtz networks.
    lattice: Central grid position; major interconnection capacity with nine neighbours.

