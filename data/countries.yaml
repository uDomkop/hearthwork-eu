  reasons:
    fiscal: Euro member since 1999; deeply integrated into the Eurozone banking and fiscal framework.
    shield: Constitutional neutrality (1955 State Treaty) prohibits participation in mutual defence obligations.
    gate: Full Schengen member since 1997; central alpine transit role.
    loom: Strong digital governance alignment; active in AI regulation discussions.
    green: Hydropower-rich; strong green energy profile; full ETS participant.
    bench: Full EU judicial cooperation; active CJEU engagement.
    atlas: Major ESA contributor; strong satellite and Earth observation programmes.
    forge: Significant industrial base — steel (voestalpine), advanced manufacturing.
    library: Deep academic tradition; major Erasmus participant; Vienna as cultural capital.
    spring: Danube headwaters; extensive Alpine water management; key transboundary role.
    anchor: Landlocked — no maritime coastline, so no coast guard role.
    lyre: UNESCO heritage density among the highest in Europe; strong arts funding tradition.
    krone: Euro member — not in the Nordic currency zone.
    pharmacy: Major pharmaceutical and medical device sector; full HERA participant.
    beacon: Partial — strong research base but smaller scale than the core funders.
    lattice: Partial — Alpine transit for energy corridors but limited grid interconnection capacity relative to size.

