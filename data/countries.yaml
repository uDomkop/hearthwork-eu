# === INNER UNION ASSOCIATES ===

NOR:
  name: Norway
  standing: inner-assoc
  note: EEA member; potential Krone Hestia founder
  hestias: { fiscal: 0, shield: 1, gate: 1, loom: 1, green: 1, bench: 0.5, atlas: 1, forge: 0.5, library: 1, spring: 0.5, anchor: 1, lyre: 1, krone: 1, pharmacy: 0.5, beacon: 1, lattice: 1 }
  reasons:
    fiscal: Retains the Norwegian krone; sovereign wealth fund makes euro adoption unnecessary.
    shield: NATO member since 1949; Arctic defence role; hosts allied exercises.
    gate: Full Schengen member via the Nordic Passport Union; manages Arctic external border.
    loom: Full EEA alignment on digital regulation; GDPR equivalent in force.
    green: Major hydropower producer; offshore wind pioneer; oil fund transitioning to green mandates.
    bench: Partial — EEA judicial framework via EFTA Court; not directly under CJEU jurisdiction.
    atlas: Major ESA contributor; strong satellite and Earth observation programmes; Arctic expertise.
    forge: Partial — significant energy and maritime industrial base but limited strategic manufacturing.
    library: Full Nordic cooperation on education; major Erasmus associated country.
    spring: Partial — limited transboundary river basins; strong domestic water management.
    anchor: Extensive coastline; major coast guard; North Sea and Arctic maritime leadership.
    lyre: Rich cultural heritage; active Nordic cultural cooperation.
    krone: Natural Krone Hestia founder — the Norwegian krone is the anchor of Nordic monetary cooperation.
    pharmacy: Partial — strong public health system but limited pharmaceutical manufacturing.
    beacon: Major Horizon associated country; strong research base (NTNU, SINTEF).
    lattice: Major energy exporter; North Sea interconnectors to UK, Germany, Denmark, Netherlands.

